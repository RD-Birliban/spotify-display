<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.cover{
width:50%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.tracklist{
width:50%;
overflow-y:auto;
padding:40px;
box-sizing:border-box;
}

.track{
padding:8px 0;
border-bottom:1px solid #333;
font-size:18px;
}

.track.current{
color:#00ffcc;
font-weight:bold;
}

</style>

</head>

<body>

<div class="cover" id="cover"></div>
<div class="tracklist" id="tracks"></div>

<script>

const CLIENT_ID="ae924384707e45a48f0f2ad40d81b7ba";
const REDIRECT_URI=window.location.href.split("#")[0];

const playlists={
"6TQ37H5gLqvnxnKEayZu9I":"stardust1.jpg",
"6MzB3QOiWI4Qy9N9iHkdrm":"stardust2.jpg",
"6u48tAKP7yP2ankPJcGlHn":"stardust3.jpg",
"3iBWHhVX14r2PCwDmDRMw3":"stardust4.jpg",
"1WCQMg708ovpzimXgvdX5x":"stardust5.jpg",
"2C2iDRGUe4Mr2Z37Pou08P":"stardust6.jpg",
"7nzEEyhFPyuViEsLmqobOy":"stardust7.jpg",
"55mIftuEdbkyRd8ODZKgmX":"stardust8.jpg",
"7ltsfibFaWTIWkhIAFEcce":"stardust9.jpg",
"0Y2zyerj0yX6A59GPOEcEt":"stardust10.jpg",
"1T2s8sOdvTf8WWOCYo6qEF":"stardust11.jpg",
"49Hxf2UzxMm0QDN59BdHxO":"stardust12.jpg",
"0QhTmNi5btV3EJ6uDLxfzt":"stardust13.jpg",
"60U1qPaQ5RUCFQyjqPEAwO":"stardust14.jpg",
"3SbH41Hou0JDePcQtIxq4H":"stardust15.jpg",
"10k2UhKJUy2DODxM2xCqer":"stardust16.jpg",
"7i1GWf9jDtxsl4mvyZcRpb":"stardust17.jpg"
};

function login(){

const scopes="user-read-playback-state";

window.location=
"https://accounts.spotify.com/authorize"+
"?client_id="+CLIENT_ID+
"&response_type=token"+
"&redirect_uri="+encodeURIComponent(REDIRECT_URI)+
"&scope="+scopes;

}

function getToken(){

const hash=window.location.hash;

if(!hash){
login();
return null;
}

return hash.split("&")[0].split("=")[1];

}

async function getCurrentTrack(token){

const res=await fetch(
"https://api.spotify.com/v1/me/player/currently-playing",
{
headers:{Authorization:"Bearer "+token}
}
);

return await res.json();

}

async function getPlaylistTracks(token,playlistId){

const res=await fetch(
"https://api.spotify.com/v1/playlists/"+playlistId+"/tracks",
{
headers:{Authorization:"Bearer "+token}
}
);

return await res.json();

}

function setCover(playlistId){

const cover=playlists[playlistId];

document.getElementById("cover").style.backgroundImage=
"url("+cover+")";

}

function renderTracks(data,currentId){

const list=document.getElementById("tracks");
list.innerHTML="";

data.items.forEach(item=>{

const track=item.track;

const div=document.createElement("div");
div.className="track";

if(track.id===currentId){
div.classList.add("current");
}

div.innerText=track.name+" — "+track.artists[0].name;

list.appendChild(div);

});

}

async function update(){

const token=getToken();
if(!token)return;

const playing=await getCurrentTrack(token);

if(!playing || !playing.context)return;

const playlistId=playing.context.uri.split(":")[2];

setCover(playlistId);

const tracks=await getPlaylistTracks(token,playlistId);

renderTracks(tracks,playing.item.id);

}

setInterval(update,5000);

update();


// Wake Lock

let wakeLock=null;

async function activateWakeLock(){
try{
wakeLock=await navigator.wakeLock.request("screen");
}catch(e){}
}

activateWakeLock();

document.addEventListener("visibilitychange",()=>{
if(document.visibilityState==="visible"){
activateWakeLock();
}
});


// Landscape Lock

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}

</script>

</body>
</html>
