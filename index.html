<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.playlists{
width:18%;
border-right:1px solid #333;
padding:20px;
}

.playlist{
padding:15px;
border-bottom:1px solid #333;
cursor:pointer;
font-size:18px;
}

.playlist:hover{
background:#222;
}

.cover{
width:50%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.right{
width:32%;
display:flex;
align-items:center;
justify-content:center;
}

iframe{
width:95%;
height:90%;
border-radius:10px;
border:none;
}

</style>

</head>

<body>

<div class="playlists">

<div class="playlist" onclick="load('6TQ37H5gLqvnxnKEayZu9I')">
Stardust Lounge Vol.1
</div>

<div class="playlist" onclick="load('6MzB3QOiWI4Qy9N9iHkdrm')">
Stardust Lounge Vol.2
</div>

<div class="playlist" onclick="load('6u48tAKP7yP2ankPJcGlHn')">
Stardust Lounge Vol.3
</div>

</div>

<div class="cover" id="cover"></div>

<div class="right" id="player"></div>

<script>

async function load(id){

document.getElementById("player").innerHTML =
'<iframe src="https://open.spotify.com/embed/playlist/'+id+'"></iframe>';

const res = await fetch("https://open.spotify.com/oembed?url=https://open.spotify.com/playlist/"+id);
const data = await res.json();

document.getElementById("cover").style.backgroundImage =
"url("+data.thumbnail_url+")";

}

load("6TQ37H5gLqvnxnKEayZu9I")

</script>

</body>

</html>
