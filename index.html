<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:black;
display:flex;
height:100vh;
overflow:hidden;
font-family:Arial;
}

.cover{
width:50%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.tracklist{
width:50%;
background:black;
display:flex;
align-items:center;
justify-content:center;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<div class="cover" id="cover"></div>

<div class="tracklist">
<iframe id="playlistFrame"></iframe>
</div>

<script>

const playlists = {

"6TQ37H5gLqvnxnKEayZu9I":"stardust1.jpg",
"6MzB3QOiWI4Qy9N9iHkdrm":"stardust2.jpg",
"6u48tAKP7yP2ankPJcGlHn":"stardust3.jpg",
"3iBWHhVX14r2PCwDmDRMw3":"stardust4.jpg",
"1WCQMg708ovpzimXgvdX5x":"stardust5.jpg",
"2C2iDRGUe4Mr2Z37Pou08P":"stardust6.jpg",
"7nzEEyhFPyuViEsLmqobOy":"stardust7.jpg",
"55mIftuEdbkyRd8ODZKgmX":"stardust8.jpg",
"7ltsfibFaWTIWkhIAFEcce":"stardust9.jpg",
"0Y2zyerj0yX6A59GPOEcEt":"stardust10.jpg",
"1T2s8sOdvTf8WWOCYo6qEF":"stardust11.jpg",
"49Hxf2UzxMm0QDN59BdHxO":"stardust12.jpg",
"0QhTmNi5btV3EJ6uDLxfzt":"stardust13.jpg",
"60U1qPaQ5RUCFQyjqPEAwO":"stardust14.jpg",

"10k2UhKJUy2DODxM2xCqer":"stardust16.jpg",
"7i1GWf9jDtxsl4mvyZcRpb":"stardust17.jpg"

};

const playlist="6TQ37H5gLqvnxnKEayZu9I";

document.getElementById("cover").style.backgroundImage =
"url("+playlists[playlist]+")";

document.getElementById("playlistFrame").src =
"https://open.spotify.com/embed/playlist/"+playlist+"?utm_source=generator";


// Wake Lock
let wakeLock=null;

async function activateWakeLock(){
try{
wakeLock=await navigator.wakeLock.request("screen");
}catch(e){}
}

activateWakeLock();

document.addEventListener("visibilitychange",()=>{
if(document.visibilityState==="visible"){
activateWakeLock();
}
});


// Landscape Lock
if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}

</script>

</body>

</html>
