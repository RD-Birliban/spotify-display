<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.cover{
width:50%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.playlist{
width:50%;
overflow-y:auto;
padding:40px;
box-sizing:border-box;
}

.song{
padding:8px 0;
border-bottom:1px solid #333;
font-size:18px;
}

/* Portrait automatisch drehen */

@media screen and (orientation: portrait) {

body{
transform:rotate(90deg);
transform-origin:center;
width:100vh;
height:100vw;
position:absolute;
top:0;
left:0;
overflow:hidden;
}

}

</style>

</head>

<body>

<div class="cover" id="cover"></div>

<div class="playlist" id="playlist"></div>

<script>

// ---------- PLAYLISTS ----------

const playlists = {

1:{ id:"6TQ37H5gLqvnxnKEayZu9I", cover:"stardust1.jpg"},
2:{ id:"6MzB3QOiWI4Qy9N9iHkdrm", cover:"stardust2.jpg"},
3:{ id:"6u48tAKP7yP2ankPJcGlHn", cover:"stardust3.jpg"},
4:{ id:"3iBWHhVX14r2PCwDmDRMw3", cover:"stardust4.jpg"},
5:{ id:"1WCQMg708ovpzimXgvdX5x", cover:"stardust5.jpg"},
6:{ id:"2C2iDRGUe4Mr2Z37Pou08P", cover:"stardust6.jpg"},
7:{ id:"7nzEEyhFPyuViEsLmqobOy", cover:"stardust7.jpg"},
8:{ id:"55mIftuEdbkyRd8ODZKgmX", cover:"stardust8.jpg"},
9:{ id:"7ltsfibFaWTIWkhIAFEcce", cover:"stardust9.jpg"},
10:{ id:"0Y2zyerj0yX6A59GPOEcEt", cover:"stardust10.jpg"},
11:{ id:"1T2s8sOdvTf8WWOCYo6qEF", cover:"stardust11.jpg"},
12:{ id:"49Hxf2UzxMm0QDN59BdHxO", cover:"stardust12.jpg"},
13:{ id:"0QhTmNi5btV3EJ6uDLxfzt", cover:"stardust13.jpg"},
14:{ id:"60U1qPaQ5RUCFQyjqPEAwO", cover:"stardust14.jpg"},
15:{ id:"3SbH41Hou0JDePcQtIxq4H", cover:"stardust15.jpg"},
16:{ id:"10k2UhKJUy2DODxM2xCqer", cover:"stardust16.jpg"},
17:{ id:"7i1GWf9jDtxsl4mvyZcRpb", cover:"stardust17.jpg"}

};


// ---------- URL PARAMETER ----------

const params = new URLSearchParams(window.location.search);
const playlistNumber = params.get("playlist") || "1";

const playlistData = playlists[playlistNumber];


// ---------- COVER ----------

document.getElementById("cover").style.backgroundImage =
"url("+playlistData.cover+")";


// ---------- SONGS LADEN ----------

async function loadSongs(){

const url = "https://open.spotify.com/playlist/"+playlistData.id;

const res = await fetch("https://api.allorigins.win/raw?url="+url);

const html = await res.text();

const parser = new DOMParser();
const doc = parser.parseFromString(html,"text/html");

const tracks = doc.querySelectorAll("meta[property='music:song']");

const list = document.getElementById("playlist");
list.innerHTML="";

tracks.forEach((track,i)=>{

const div = document.createElement("div");
div.className="song";
div.innerText = "Track "+(i+1);

list.appendChild(div);

});

}

loadSongs();


// ---------- WAKE LOCK ----------

let wakeLock=null;

async function activateWakeLock(){

try{
wakeLock = await navigator.wakeLock.request("screen");
}catch(e){}

}

activateWakeLock();

document.addEventListener("visibilitychange",()=>{

if(document.visibilityState==="visible"){
activateWakeLock();
}

});


// ---------- LANDSCAPE LOCK ----------

function lockLandscape(){

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}

}

document.body.addEventListener("click",lockLandscape,{once:true});

</script>

</body>

</html>
