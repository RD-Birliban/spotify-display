<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.cover{
width:50%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.playlist{
width:50%;
overflow-y:auto;
padding:40px;
box-sizing:border-box;
}

.song{
padding:8px 0;
border-bottom:1px solid #333;
font-size:18px;
}

/* Portrait automatisch drehen */

@media screen and (orientation: portrait){

body{
transform:rotate(90deg);
transform-origin:center;
width:100vh;
height:100vw;
position:absolute;
top:0;
left:0;
}

}

</style>

</head>

<body>

<div class="cover" id="cover"></div>

<div class="playlist" id="playlist"></div>

<script>

// ---------- PLAYLISTS ----------

const playlists={

1:{
cover:"stardust1.jpg",
songs:[
"Track 1",
"Track 2",
"Track 3",
"Track 4",
"Track 5"
]
},

10:{
cover:"stardust10.jpg",
songs:[
"Track A",
"Track B",
"Track C",
"Track D"
]
}

};


// ---------- URL PARAMETER ----------

const params=new URLSearchParams(window.location.search);

const playlist=params.get("playlist") || "1";

const data=playlists[playlist];


// ---------- COVER ----------

document.getElementById("cover").style.backgroundImage=
"url("+data.cover+")";


// ---------- PLAYLIST ----------

const list=document.getElementById("playlist");

data.songs.forEach(song=>{

const div=document.createElement("div");

div.className="song";

div.innerText=song;

list.appendChild(div);

});


// ---------- WAKE LOCK ----------

let wakeLock=null;

async function activateWakeLock(){

try{
wakeLock=await navigator.wakeLock.request("screen");
}catch(e){}

}

activateWakeLock();

document.addEventListener("visibilitychange",()=>{

if(document.visibilityState==="visible"){
activateWakeLock();
}

});


// ---------- LANDSCAPE LOCK ----------

function lockLandscape(){

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}

}

document.body.addEventListener("click",lockLandscape,{once:true});

</script>

</body>

</html>
