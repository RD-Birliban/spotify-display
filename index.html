<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
display:flex;
background:black;
color:white;
font-family:Arial;
height:100vh;
}

.playlists{
width:25%;
overflow:auto;
border-right:1px solid #333;
padding:20px;
}

.playlist{
padding:10px;
cursor:pointer;
border-bottom:1px solid #333;
}

.playlist:hover{
background:#222;
}

.cover{
width:35%;
background-size:cover;
background-position:center;
}

.songs{
width:40%;
overflow:auto;
padding:20px;
}

.song{
padding:8px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="playlists" id="playlists"></div>
<div class="cover" id="cover"></div>
<div class="songs" id="songs"></div>

<script>

const clientId = "ae924384707e45a48f0f2ad40d81b7ba";
const redirectUri = "https://rd-birliban.github.io/spotify-display";
const scopes = "playlist-read-private";

function login(){
let url =
"https://accounts.spotify.com/authorize" +
"?client_id=" + clientId +
"&response_type=code" +
"&redirect_uri=" + encodeURIComponent(redirectUri) +
"&scope=" + scopes;

window.location = url;
}

function getToken(){
let hash = window.location.hash;
if(!hash){
login();
return null;
}
return hash.split("&")[0].split("=")[1];
}

async function loadPlaylists(){

const token = getToken();
if(!token) return;

const res = await fetch("https://api.spotify.com/v1/me/playlists",{
headers:{Authorization:"Bearer "+token}
});

const data = await res.json();

const list = document.getElementById("playlists");

data.items.forEach(p => {

let div = document.createElement("div");
div.className="playlist";
div.innerText=p.name;

div.onclick=()=>loadPlaylist(p);

list.appendChild(div);

});

}

async function loadPlaylist(p){

document.getElementById("cover").style.backgroundImage =
"url("+p.images[0].url+")";

const token = getToken();

const res = await fetch(p.tracks.href,{
headers:{Authorization:"Bearer "+token}
});

const data = await res.json();

const songs = document.getElementById("songs");
songs.innerHTML="";

data.items.forEach(item=>{

let div = document.createElement("div");
div.className="song";
div.innerText=item.track.name+" - "+item.track.artists[0].name;

songs.appendChild(div);

});

}

loadPlaylists();

</script>

</body>
</html>
