<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.cover{
width:50%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.tracklist{
width:50%;
overflow-y:auto;
padding:40px;
box-sizing:border-box;
}

.track{
padding:10px 0;
border-bottom:1px solid #333;
font-size:20px;
}

.track.current{
color:#00ffcc;
font-weight:bold;
}

</style>

</head>

<body>

<div class="cover" id="cover"></div>

<div class="tracklist" id="tracklist"></div>

<script>

// ---------- PLAYLIST DATEN ----------

const playlists = {
"6TQ37H5gLqvnxnKEayZu9I": "stardust1.jpg",
"6MzB3QOiWI4Qy9N9iHkdrm": "stardust2.jpg",
"6u48tAKP7yP2ankPJcGlHn": "stardust3.jpg",
"3iBWHhVX14r2PCwDmDRMw3": "stardust4.jpg",
"1WCQMg708ovpzimXgvdX5x": "stardust5.jpg",
"2C2iDRGUe4Mr2Z37Pou08P": "stardust6.jpg",
"7nzEEyhFPyuViEsLmqobOy": "stardust7.jpg",
"55mIftuEdbkyRd8ODZKgmX": "stardust8.jpg",
"7ltsfibFaWTIWkhIAFEcce": "stardust9.jpg",
"0Y2zyerj0yX6A59GPOEcEt": "stardust10.jpg",
"1T2s8sOdvTf8WWOCYo6qEF": "stardust11.jpg",
"49Hxf2UzxMm0QDN59BdHxO": "stardust12.jpg",
"0QhTmNi5btV3EJ6uDLxfzt": "stardust13.jpg",
"60U1qPaQ5RUCFQyjqPEAwO": "stardust14.jpg",
"3SbH41Hou0JDePcQtIxq4H": "stardust15.jpg",
"10k2UhKJUy2DODxM2xCqer": "stardust16.jpg",
"7i1GWf9jDtxsl4mvyZcRpb": "stardust17.jpg"
};

// ---------- COVER ANZEIGEN ----------

function setCover(playlistId){
const cover = playlists[playlistId];
document.getElementById("cover").style.backgroundImage =
"url("+cover+")";
}

// ---------- SONG LISTE LADEN ----------

async function loadTracks(playlistId){

const res = await fetch(
"https://api.allorigins.win/raw?url=https://open.spotify.com/playlist/"+playlistId
);

const html = await res.text();

const parser = new DOMParser();
const doc = parser.parseFromString(html, "text/html");

const tracks = doc.querySelectorAll("meta[property='music:song']");

const list = document.getElementById("tracklist");
list.innerHTML="";

tracks.forEach((track,index)=>{

const div=document.createElement("div");
div.className="track";
div.innerText="Track "+(index+1);

list.appendChild(div);

});

}

// ---------- WAKE LOCK ----------

let wakeLock = null;

async function activateWakeLock(){
try{
wakeLock = await navigator.wakeLock.request("screen");
}catch(err){}
}

activateWakeLock();

document.addEventListener("visibilitychange",()=>{
if(document.visibilityState==="visible"){
activateWakeLock();
}
});

// ---------- LANDSCAPE LOCK ----------

if (screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}

// ---------- START ----------

const defaultPlaylist="6TQ37H5gLqvnxnKEayZu9I";

setCover(defaultPlaylist);
loadTracks(defaultPlaylist);

</script>

</body>
</html>
