<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.playlists{
width:20%;
border-right:1px solid #333;
padding:20px;
}

.playlist{
padding:15px;
border-bottom:1px solid #333;
cursor:pointer;
font-size:18px;
}

.playlist:hover{
background:#222;
}

.cover{
width:40%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.player{
width:30%;
display:flex;
align-items:center;
justify-content:center;
}

iframe{
width:95%;
height:90%;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="playlists">

<div class="playlist" onclick="loadPlaylist('6TQ37H5gLqvnxnKEayZu9I','stardust1.jpg')">
Stardust Lounge Vol.1
</div>

<div class="playlist" onclick="loadPlaylist('6MzB3QOiWI4Qy9N9iHkdrm','stardust2.jpg')">
Stardust Lounge Vol.2
</div>

<div class="playlist" onclick="loadPlaylist('6u48tAKP7yP2ankPJcGlHn','stardust3.jpg')">
Stardust Lounge Vol.3
</div>

</div>

<div class="cover" id="cover"></div>

<div class="player" id="player"></div>

<script>

function loadPlaylist(id,cover){

document.getElementById("player").innerHTML =
'<iframe src="https://open.spotify.com/embed/playlist/'+id+'"></iframe>';

document.getElementById("cover").style.backgroundImage =
"url("+cover+")";

}

// Startplaylist automatisch laden
loadPlaylist(
"6TQ37H5gLqvnxnKEayZu9I",
"stardust1.jpg"
);

</script>

</body>

</html>
